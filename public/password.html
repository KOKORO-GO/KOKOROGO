<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KokoroGo（心GO）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --sakura: #F8B4C8;
            --sakura-deep: #E88BA7;
            --sakura-light: #FDE4EC;
            --night: #1A1025;
            --cream: #FFF9F5;
            --gold: #D4A853;
            --soft-purple: #9B8EC4;
            --sky: #7EC8E3;
            --text: #2D2235;
            --text-light: #6B5F7B;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(165deg, #1A1025 0%, #2D1B3D 35%, #3D2451 60%, #4A2D5E 100%);
            position: relative;
            overflow: hidden;
        }

        /* Background glow effects — matching hero section */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(248,180,200,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -15%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(126,200,227,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 24px;
            max-width: 420px;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 48px;
            text-decoration: none;
        }
        .logo .heart {
            color: var(--sakura);
            font-size: 2rem;
        }
        .logo-text {
            font-weight: 800;
            font-size: 2rem;
            color: #fff;
        }

        .subtitle {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .form-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px 32px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            padding-right: 50px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.35);
        }
        .input-group input:focus {
            border-color: var(--sakura);
            background: rgba(255,255,255,0.12);
        }

        .input-group .material-symbols-outlined {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 22px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 100px;
            background: var(--sakura);
            color: var(--night);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(248,180,200,0.4);
        }
        .submit-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #F4845F;
            font-size: 0.85rem;
            margin-top: 16px;
            min-height: 20px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .error-msg.visible {
            opacity: 1;
        }

        /* Floating sakura petals */
        .petal {
            position: fixed;
            width: 12px;
            height: 12px;
            background: var(--sakura);
            border-radius: 50% 0 50% 50%;
            opacity: 0.15;
            pointer-events: none;
            animation: fall linear infinite;
        }
        .petal:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 10px; height: 10px; }
        .petal:nth-child(2) { left: 30%; animation-duration: 15s; animation-delay: 2s; width: 8px; height: 8px; }
        .petal:nth-child(3) { left: 55%; animation-duration: 11s; animation-delay: 4s; }
        .petal:nth-child(4) { left: 75%; animation-duration: 14s; animation-delay: 1s; width: 9px; height: 9px; }
        .petal:nth-child(5) { left: 90%; animation-duration: 13s; animation-delay: 3s; width: 7px; height: 7px; }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 1.6rem; }
            .logo .heart { font-size: 1.6rem; }
            .form-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <!-- Floating petals -->
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>

    <div class="container">
        <div class="logo">
            <span class="heart material-symbols-outlined">favorite</span>
            <span class="logo-text">KokoroGo</span>
        </div>

        <p class="subtitle">好きを見つけて、未来をつくろう</p>

        <div class="form-card">
            <p class="form-label">Enter Password</p>

            <form id="passwordForm">
                <div class="input-group">
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="Password"
                        autocomplete="off"
                        autofocus
                    >
                    <span class="material-symbols-outlined">lock</span>
                </div>

                <button type="submit" class="submit-btn">Enter</button>
            </form>

            <p class="error-msg" id="errorMsg">Incorrect password. Please try again.</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('passwordForm');
        const input = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('visible');

            const password = input.value;
            if (!password) return;

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errorMsg.classList.add('visible');
                    input.value = '';
                    input.focus();
                }
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.classList.add('visible');
            }
        });
    </script>
</body>
</html>
